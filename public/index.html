<script>
    function abrirVerificar(){

let panel=document.getElementById("panelVerificar")

if(panel.style.display=="none"){

panel.style.display="block"

}else{

panel.style.display="none"

}

}
    async function consultarNumeros(){

let telefono = document.getElementById("telefonoConsulta").value

let res = await fetch("/mis-numeros?telefono="+telefono)

let data = await res.json()

if(data.length == 0){

document.getElementById("resultadoNumeros").innerHTML =
"No se encontraron números"

return

}

let lista = data.map(n=>String(n.numero).padStart(6,'0')).join(", ")

document.getElementById("resultadoNumeros").innerHTML =
"🎟️ Tus números:<br><br>"+lista
}
    async function iniciarContador(){      
let res = await fetch("/admin/cierre")
let data = await res.json()

if(!data.cierre) return

let cierre = new Date(data.cierre)

setInterval(()=>{

let ahora = new Date()
let diff = cierre - ahora

if(diff <= 0){

document.getElementById("contadorBox").innerHTML =
"<h2>SORTEO CERRADO</h2>"

return
}

let dias = Math.floor(diff/86400000)
let horas = Math.floor(diff%86400000/3600000)
let minutos = Math.floor(diff%3600000/60000)
let segundos = Math.floor(diff%60000/1000)

document.getElementById("dias").innerText=dias
document.getElementById("horas").innerText=horas
document.getElementById("minutos").innerText=minutos
document.getElementById("segundos").innerText=segundos

},1000)

}
async function cargarGaleria(){

let res=await fetch("/imagenes")

let data=await res.json()

let galeria=document.getElementById("galeria")

galeria.innerHTML=""

data.forEach(img=>{

let i=document.createElement("img")

i.src="/imagenes/"+img

i.style.width="200px"
i.style.margin="10px"
i.style.borderRadius="10px"

galeria.appendChild(i)

})

}

cargarGaleria()

iniciarContador()
    async function contadorCierre(){

let res = await fetch("/admin/cierre")

let data = await res.json()

if(!data.cierre) return

let cierre = new Date(data.cierre)

setInterval(()=>{

let ahora = new Date()

let diff = cierre - ahora

if(diff <= 0){

document.getElementById("contadorTiempo").innerText =
"⛔ SORTEO CERRADO"

return

}

let horas = Math.floor(diff/3600000)
let minutos = Math.floor(diff%3600000/60000)
let segundos = Math.floor(diff%60000/1000)

document.getElementById("contadorTiempo").innerText =
"⏳ Cierra en: "+horas+"h "+minutos+"m "+segundos+"s"

},1000)

}
iniciarContador()
setInterval(iniciarContador,5000)

let pagina=1
let seleccionados=[]
let precio=10000
async function cargarPrecio(){

let res = await fetch("/admin/precio")

let data = await res.json()

precio = data.precio

}

function siguiente(){
pagina++
cargar()
}

function anterior(){
if(pagina>1){
pagina--
cargar()
}
}

function cargar(){

document.getElementById("paginaTexto").innerText="Página "+pagina

fetch("/numeros?pagina="+pagina)
.then(r=>r.json())
.then(data=>{

let grid=document.getElementById("grid")

grid.innerHTML=""

data.forEach(n=>{

let div=document.createElement("div")

div.className="numero"

div.innerText=String(n.numero).padStart(6,'0')

if(n.estado=="pagado"){

div.classList.add("pagado")

}else{

div.onclick=()=>toggleSeleccion(n.numero,div)

}

grid.appendChild(div)

})

})

}

function toggleSeleccion(numero,div){

numero=parseInt(numero)

if(seleccionados.includes(numero)){

seleccionados=seleccionados.filter(n=>n!==numero)
div.style.background="lime"

}else{

seleccionados.push(numero)
div.style.background="orange"

}

}


async function maquinaAzar(){

let cantidad = prompt("¿Cuántos números quieres?")

if(!cantidad) return

cantidad = parseInt(cantidad)

let display = document.getElementById("maquinaNumero")

if(!display){
alert("Error: no existe el display de la maquinita")
return
}

let anim = setInterval(()=>{

let r = Math.floor(Math.random()*1000000)

display.innerText = String(r).padStart(6,'0')

},70)

setTimeout(async ()=>{

clearInterval(anim)

try{

let res = await fetch("/azar?cantidad="+cantidad)

let data = await res.json()

seleccionados = data.map(n=>parseInt(n.numero))

display.innerText = seleccionados
.map(n=>String(n).padStart(6,'0'))
.join(" - ")

cargar()

}catch(e){

alert("Error conectando con la maquinita")

console.log(e)

}

},3000)

}
function buscarNumero(){

let numero = document.getElementById("buscarNumero").value

numero = parseInt(numero)

let paginaNumero = Math.floor(numero/100)+1

pagina = paginaNumero

cargar()

setTimeout(()=>{

let elementos = document.querySelectorAll(".numero")

elementos.forEach(el=>{

if(el.innerText == String(numero).padStart(6,'0')){

el.scrollIntoView({behavior:"smooth",block:"center"})
el.style.boxShadow="0 0 20px gold"

}

})

},500)

}
async function pagar(){

if(seleccionados.length==0){

alert("Selecciona números")

return

}

let nombre=prompt("Nombre completo")

let telefono=prompt("Teléfono")

let referencia="REF-"+Date.now()

let cuenta=await fetch("/cuenta-random").then(r=>r.json())

let whatsapp=cuenta.whatsapp
let nequi=cuenta.nequi
let daviplata=cuenta.daviplata

alert(

"INSTRUCCIONES DE PAGO\n\n"+
"💰 Valor por número: $" + precio+
"Puedes pagar por:\n\n"+
"📲 NEQUI: "+nequi+"\n"+
"📲 DAVIPLATA: "+daviplata+"\n\n"+
"⚠️ Después envía el comprobante al WhatsApp."

)

fetch("/pago",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

numeros:seleccionados,
nombre:nombre,
telefono:telefono,
referencia:referencia

})

})

let mensaje=

"🎟️ COMPRA DE SORTEO\n\n"+

"Referencia: "+referencia+"\n\n"+

"Nombre: "+nombre+"\n"+
"Telefono: "+telefono+"\n\n"+

"Numeros:\n"+

seleccionados.map(n=>String(n).padStart(6,'0')).join(", ")+"\n\n"+

"Total: $"+(seleccionados.length*precio)+"\n\n"+

"Envío comprobante de pago."

window.open(
"https://wa.me/"+whatsapp+"?text="+encodeURIComponent(mensaje)
)

seleccionados=[]

cargar()

}

async function admin(){

let pass=prompt("Contraseña admin")

let conf=await fetch("/config").then(r=>r.json())

if(pass!==conf.adminPass){

alert("Contraseña incorrecta")
return

}

let numeros=prompt("Numeros a liberar separados por coma")

let lista=numeros.split(",").map(n=>parseInt(n))

fetch("/liberar",{

method:"POST",

headers:{
"Content-Type":"application/json",
"x-admin-pass": pass   // 🔥 ESTA LÍNEA ES LA CLAVE
},

body:JSON.stringify({numeros:lista})

})
}

async function panelCuentas(){

let pass=prompt("Contraseña admin")

let conf=await fetch("/config").then(r=>r.json())

if(pass!==conf.adminPass){

alert("Contraseña incorrecta")
return

}

let cuentas=await fetch("/admin/cuentas").then(r=>r.json())

let texto="CUENTAS ACTIVAS\n\n"

cuentas.forEach(c=>{

texto+="ID:"+c.id+
"\nWhatsApp:"+c.whatsapp+
"\nNequi:"+c.nequi+
"\nDaviplata:"+c.daviplata+
"\n\n"

})

let opcion=prompt(

texto+
"OPCIONES\n\n"+
"1 Agregar cuenta\n"+
"2 Eliminar cuenta"

)

if(opcion==1){

let whatsapp=prompt("Número WhatsApp")
let nequi=prompt("Número Nequi")
let daviplata=prompt("Número Daviplata")

fetch("/admin/agregar-cuenta",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-pass": pass
},
body:JSON.stringify({
whatsapp,
nequi,
daviplata
})
})

}

if(opcion==2){

let id=prompt("ID de la cuenta a eliminar")

fetch("/admin/eliminar-cuenta",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-pass": pass
},
body:JSON.stringify({id})
})
}

}

async function iniciar(){
    

await cargarPrecio()

cargar()

}

iniciar()
setInterval(()=>{
  cargar()
  cargarImagenes()
},5000)

</script>
