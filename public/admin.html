<!DOCTYPE html>
<html>

<head>
<title>ADMIN SORTEO</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{ color:gold; }

.card{
background:#222;
padding:20px;
margin:20px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button{
background:gold;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:8px;
}

.progreso{
width:100%;
background:#333;
height:30px;
border-radius:10px;
overflow:hidden;
}

.barra{
height:100%;
background:lime;
}
</style>
</head>

<body>

<h1>⚙️ PANEL ADMIN SORTEO</h1>

<script>
// LOGIN
let passGlobal = prompt("Ingrese contraseña admin")

function fetchAdmin(url, options = {}){
if(!options.headers) options.headers = {}
options.headers["x-admin-pass"] = passGlobal
return fetch(url, options)
}
</script>

<h3>Precio del número</h3>
<input id="precioNuevo" placeholder="Nuevo precio">
<button onclick="cambiarPrecio()">Cambiar precio</button>
<p id="precioActual"></p>

<div class="card">
<h3>Buscar número</h3>
<input id="numeroBuscar" placeholder="Numero">
<button onclick="buscar()">Buscar</button>
<div id="resultado"></div>
</div>

<div class="card">
<h3>Liberar números</h3>
<input id="liberarNumeros" placeholder="Ej: 12,45,89">
<button onclick="liberar()">Liberar</button>
</div>

<div class="card">
<h3>Progreso del sorteo</h3>
<div class="progreso">
<div id="barra" class="barra" style="width:0%"></div>
</div>
<p id="textoProgreso"></p>
</div>

<div class="card">
<h3>Cuentas de pago</h3>
<button onclick="verCuentas()">Ver cuentas</button>
<div id="cuentas"></div>

<h4>Agregar cuenta</h4>
<input id="whatsapp" placeholder="WhatsApp">
<input id="nequi" placeholder="Nequi">
<input id="daviplata" placeholder="Daviplata">
<button onclick="agregarCuenta()">Agregar</button>
</div>

<div class="card">
<h3>Imágenes del sorteo</h3>

<input type="file" id="imagen">
<button onclick="subirImagen()">Subir imagen</button>

<div id="listaImagenes" style="display:flex;flex-wrap:wrap;gap:15px;"></div>
</div>

<div class="card">
<h3>Fecha de cierre</h3>
<input type="datetime-local" id="fechaCierre">
<button onclick="guardarCierre()">Guardar fecha</button>
</div>

<table>
<thead>
<tr>
<th>Numero</th>
<th>Nombre</th>
<th>Telefono</th>
<th>Referencia</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>

// PRECIO
async function cargarPrecio(){
let res = await fetchAdmin("/admin/precio")
let data = await res.json()
document.getElementById("precioActual").innerText = "Precio: $" + data.precio
}

async function cambiarPrecio(){
let precio = document.getElementById("precioNuevo").value
await fetchAdmin("/admin/precio",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({precio:parseInt(precio)})
})
alert("Precio actualizado")
cargarPrecio()
}

// BUSCAR
async function buscar(){

let n = document.getElementById("numeroBuscar").value

try{

let res = await fetchAdmin("/buscar?numero="+n)

let text = await res.text()
let data = JSON.parse(text)

if(data.estado=="disponible"){
document.getElementById("resultado").innerHTML="🟢 Disponible"
}else{
document.getElementById("resultado").innerHTML=
"🔴 Vendido<br>"+
"Nombre: "+data.nombre+"<br>"+
"Telefono: "+data.telefono
}

}catch(e){

console.log(e)
alert("Error en buscar")

}
}
// LIBERAR
async function liberar(){

let lista=document.getElementById("liberarNumeros").value
let numeros=lista.split(",").map(n=>parseInt(n))

try{

let res = await fetchAdmin("/liberar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({numeros})
})

let text = await res.text()
console.log(text)

alert("Numeros liberados")

}catch(e){

console.log(e)
alert("Error liberando")

}
}

// IMÁGENES
async function subirImagen(){
let archivo = document.getElementById("imagen").files[0]

if(!archivo){
alert("Selecciona una imagen")
return
}

let form = new FormData()
form.append("imagen", archivo)

try{

let res = await fetchAdmin("/admin/subir-imagen",{
method:"POST",
body:form
})

let text = await res.text()

console.log("RESPUESTA:", text)

alert("Imagen subida correctamente")

cargarImagenes()

}catch(e){

console.log(e)
alert("Error subiendo imagen")

}
}
async function eliminarImagen(nombre){
await fetchAdmin("/admin/eliminar-imagen",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({nombre})
})
cargarImagenes()
}

async function cargarImagenes(){
let res = await fetchAdmin("/imagenes")
let data = await res.json()

let cont = document.getElementById("listaImagenes")
cont.innerHTML=""

data.forEach(img=>{
cont.innerHTML += `
<div>
<img src="/imagenes/${img}" width="150"><br>
<button onclick="eliminarImagen('${img}')">Eliminar</button>
</div>
`
})
}

// CUENTAS
async function verCuentas(){
let res = await fetchAdmin("/admin/cuentas")
let data = await res.json()

let div = document.getElementById("cuentas")
div.innerHTML=""

data.forEach(c=>{
div.innerHTML += `
<p>${c.whatsapp} | ${c.nequi} | ${c.daviplata}
<button onclick="eliminarCuenta(${c.id})">Eliminar</button></p>
`
})
}

async function agregarCuenta(){
let whatsapp=document.getElementById("whatsapp").value
let nequi=document.getElementById("nequi").value
let daviplata=document.getElementById("daviplata").value

await fetchAdmin("/admin/agregar-cuenta",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({whatsapp,nequi,daviplata})
})

alert("Cuenta agregada")
verCuentas()
}

async function eliminarCuenta(id){
await fetchAdmin("/admin/eliminar-cuenta",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})
})
verCuentas()
}

// VENTAS
async function cargarVentas(){
let res = await fetchAdmin("/ventas")
let data = await res.json()

let tabla=document.getElementById("tabla")
tabla.innerHTML=""

data.forEach(v=>{
tabla.innerHTML+=`
<tr>
<td>${String(v.numero).padStart(6,'0')}</td>
<td>${v.nombre}</td>
<td>${v.telefono}</td>
<td>${v.referencia}</td>
</tr>`
})

let porcentaje=(data.length/1000000)*100
document.getElementById("barra").style.width=porcentaje+"%"
document.getElementById("textoProgreso").innerText=data.length+" vendidos"
}

// CIERRE
async function guardarCierre(){
let fecha = document.getElementById("fechaCierre").value

await fetchAdmin("/admin/cierre",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({fecha})
})

alert("Fecha guardada")
}

// INICIO
cargarPrecio()
cargarVentas()
cargarImagenes()
setInterval(cargarVentas,5000)

</script>

</body>
</html>
